<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/relay-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>Relay — Zero-Knowledge End-to-End Encrypted Messaging</title>
    <meta name="title" content="Relay — Zero-Knowledge End-to-End Encrypted Messaging" />
    <meta name="description" content="Secure real-time messaging with zero-knowledge end-to-end encryption. Your messages are encrypted on your device — the server never sees your private keys or plaintext. Built with NaCl (X25519 + XSalsa20-Poly1305) and BIP39 recovery phrases." />
    <meta name="keywords" content="end-to-end encryption, e2ee, zero-knowledge, secure messaging, encrypted chat, privacy, nacl, x25519, xsalsa20, poly1305, bip39, recovery phrase, real-time chat, websocket, react, mern stack" />
    <meta name="author" content="Rudra Sanandiya" />
    <meta name="robots" content="index, follow" />
    
    <!-- Security & Privacy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://relay-chat.app/" />
    <meta property="og:title" content="Relay — Zero-Knowledge End-to-End Encrypted Messaging" />
    <meta property="og:description" content="Secure real-time messaging with zero-knowledge end-to-end encryption. Your messages are encrypted on your device — the server never sees your private keys or plaintext." />
    <meta property="og:image" content="/relay-icon.svg" />
    <meta property="og:site_name" content="Relay" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://relay-chat.app/" />
    <meta property="twitter:title" content="Relay — Zero-Knowledge End-to-End Encrypted Messaging" />
    <meta property="twitter:description" content="Secure real-time messaging with zero-knowledge end-to-end encryption. Your messages are encrypted on your device — the server never sees your private keys or plaintext." />
    <meta property="twitter:image" content="/relay-icon.svg" />
    
    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Relay" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Relay" />
    
    <!-- Encryption & Security Features -->
    <meta name="encryption" content="end-to-end, zero-knowledge, client-side" />
    <meta name="encryption-algorithm" content="NaCl box (X25519 + XSalsa20-Poly1305)" />
    <meta name="key-derivation" content="BIP39 mnemonic, PBKDF2-SHA256 (100k iterations)" />
    <meta name="key-wrapping" content="AES-256-GCM" />
    <meta name="security-features" content="zero-knowledge architecture, client-side encryption, password-protected keys, recovery phrase, forward secrecy, authenticated encryption" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
